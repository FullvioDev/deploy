services:
  prometheus:
    image: prom/prometheus:${PROMETHEUS_TAG:-v3.1.0}
    container_name: ${PROMETHEUS_CNTNR:-prometheus}
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ${DIR:-/home/administrator/monitoring}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${DIR:-/home/administrator/monitoring}/data/prometheus:/prometheus

  grafana:
    image: grafana/grafana:${GRAFANA_TAG:-11.4.0}
    container_name: ${GRAFANA_CNTNR:-grafana}
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ${DIR:-/home/administrator/monitoring}/data/grafana:/var/lib/grafana
      - ${DIR:-/home/administrator/monitoring}/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
